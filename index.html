<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a5276">
<title>Add Expense — Water Refilling</title>
<style>
  :root{
    --ink:#0f2a3d; --deep:#1a5276; --mid:#2980b9; --line:#d7e3ea;
    --paper:#f4f8fb; --card:#ffffff; --muted:#6b8190;
    --green:#1e8449; --red:#c0392b; --amber:#e67e22; --field:#fbfdfe;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(180deg,#e8f1f7 0%, var(--paper) 220px);
    color:var(--ink); min-height:100vh; padding:0 0 40px;
  }
  header{
    background:var(--deep); color:#fff; padding:18px 18px 16px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:5; box-shadow:0 2px 10px rgba(26,82,118,.25);
  }
  header h1{font-size:18px; margin:0; font-weight:700; letter-spacing:.2px; display:flex; gap:8px; align-items:center;}
  .gear{background:rgba(255,255,255,.14); border:none; color:#fff; width:38px; height:38px;
    border-radius:10px; font-size:18px; cursor:pointer;}
  .gear:active{background:rgba(255,255,255,.28);}
  .wrap{max-width:520px; margin:0 auto; padding:16px;}

  .card{background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:18px; box-shadow:0 6px 22px rgba(15,42,61,.06); margin-bottom:16px;}

  label{display:block; font-size:12.5px; font-weight:700; color:var(--deep);
    text-transform:uppercase; letter-spacing:.6px; margin:14px 0 6px;}
  label:first-of-type{margin-top:0;}
  input,select{
    width:100%; font-size:17px; padding:13px 14px; border:1.5px solid var(--line);
    border-radius:11px; background:var(--field); color:var(--ink); appearance:none;
    font-family:inherit;
  }
  input:focus,select:focus{outline:none; border-color:var(--mid); background:#fff;}
  .row{display:flex; gap:12px;}
  .row > div{flex:1;}
  .peso{position:relative;}
  .peso input{padding-left:30px;}
  .peso::before{content:"₱"; position:absolute; left:13px; top:50%; transform:translateY(-50%);
    color:var(--muted); font-size:17px; font-weight:600; pointer-events:none;}

  .typechip{margin-top:8px; font-size:13px; display:inline-flex; align-items:center; gap:6px;
    padding:5px 11px; border-radius:999px; font-weight:700;}
  .t-op{background:#e9f5ee; color:var(--green);}
  .t-pay{background:#fdf0e6; color:var(--amber);}

  button.submit{
    width:100%; margin-top:20px; padding:16px; font-size:17px; font-weight:800;
    letter-spacing:.3px; color:#fff; background:var(--deep); border:none;
    border-radius:13px; cursor:pointer; transition:transform .05s, background .15s;
  }
  button.submit:active{transform:scale(.985); background:#15435f;}
  button.submit:disabled{opacity:.55; cursor:default;}

  .toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(140%);
    max-width:90%; background:#102b3d; color:#fff; padding:13px 18px; border-radius:12px;
    font-size:14px; box-shadow:0 10px 30px rgba(0,0,0,.3); transition:transform .35s cubic-bezier(.2,.9,.3,1.4);
    z-index:20; text-align:center;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .toast.ok{background:#176c43;} .toast.err{background:#a93226;}

  .today-head{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:4px;}
  .today-head h2{font-size:15px; margin:0; color:var(--deep);}
  .today-total{font-size:18px; font-weight:800; color:var(--red);}
  .today-date{font-size:12px; color:var(--muted); margin-bottom:12px;}
  .exp{display:flex; align-items:center; gap:12px; padding:11px 0; border-top:1px solid #eef3f6;}
  .exp:first-of-type{border-top:none;}
  .exp .cat{width:7px; height:36px; border-radius:4px; flex:none; background:var(--mid);}
  .exp.pay .cat{background:var(--amber);}
  .exp .body{flex:1; min-width:0;}
  .exp .desc{font-size:15px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .exp .meta{font-size:12px; color:var(--muted); margin-top:2px;}
  .exp .amt{font-size:16px; font-weight:800; color:var(--ink); flex:none;}
  .empty{color:var(--muted); font-size:14px; text-align:center; padding:18px 0; font-style:italic;}
  .spin{display:inline-block; width:15px; height:15px; border:2.5px solid rgba(255,255,255,.35);
    border-top-color:#fff; border-radius:50%; animation:r .7s linear infinite; vertical-align:-2px;}
  @keyframes r{to{transform:rotate(360deg);}}

  .setup{position:fixed; inset:0; background:rgba(8,24,35,.55); display:none;
    align-items:center; justify-content:center; padding:20px; z-index:40;}
  .setup.show{display:flex;}
  .setup .box{background:#fff; border-radius:16px; padding:22px; max-width:440px; width:100%;}
  .setup h3{margin:0 0 6px; color:var(--deep);}
  .setup p{margin:0 0 14px; font-size:13.5px; color:var(--muted); line-height:1.5;}
  .setup input{margin-bottom:14px; font-size:14px;}
  .setup .acts{display:flex; gap:10px;}
  .setup button{flex:1; padding:13px; border-radius:11px; border:none; font-weight:700; font-size:15px; cursor:pointer;}
  .setup .save{background:var(--deep); color:#fff;}
  .setup .cancel{background:#eef3f6; color:var(--ink);}
  @media (prefers-reduced-motion: reduce){*{transition:none!important; animation:none!important;}}
</style>
</head>
<body>
<header>
  <h1>💧 Add Expense</h1>
  <button class="gear" id="gear" title="Settings" aria-label="Settings">⚙︎</button>
</header>

<div class="wrap">
  <div class="card">
    <label for="date">Date</label>
    <input type="date" id="date">

    <label for="desc">Description</label>
    <input type="text" id="desc" placeholder="e.g. Meralco bill, caps, driver salary" autocomplete="off">

    <div class="row">
      <div>
        <label for="qty">Quantity</label>
        <input type="number" id="qty" value="1" min="0" inputmode="decimal">
      </div>
      <div>
        <label for="amount">Amount</label>
        <div class="peso"><input type="number" id="amount" placeholder="0.00" min="0" inputmode="decimal"></div>
      </div>
    </div>

    <label for="category">Category</label>
    <select id="category"></select>
    <div id="typechip" class="typechip t-op">Operating Expense</div>

    <button class="submit" id="save">Save expense</button>
  </div>

  <div class="card">
    <div class="today-head">
      <h2>Today's expenses</h2>
      <span class="today-total" id="todayTotal">₱0.00</span>
    </div>
    <div class="today-date" id="todayDate">—</div>
    <div id="list"><div class="empty">Loading…</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="setup" id="setup">
  <div class="box">
    <h3>Connect to your sheet</h3>
    <p>Paste the Web App URL from your spreadsheet menu:
       <b>💧 Water Refilling Account → 📱 Get Scanner URL</b>. It looks like
       <i>https://script.google.com/macros/s/…/exec</i></p>
    <input type="url" id="urlInput" placeholder="https://script.google.com/macros/s/…/exec">
    <div class="acts">
      <button class="cancel" id="setupCancel">Cancel</button>
      <button class="save" id="setupSave">Save</button>
    </div>
  </div>
</div>

<script>
  var URL_KEY = 'wr_expense_webapp_url';
  var FALLBACK_CATS = ['Operation','Salaries/Wages','Fuel/Gas','Electricity','Water','Internet','Payables','Others'];

  var $ = function(id){ return document.getElementById(id); };
  function getUrl(){ return localStorage.getItem(URL_KEY) || ''; }
  function setUrl(u){ localStorage.setItem(URL_KEY, u.trim()); }
  function typeOf(cat){ return String(cat).indexOf('Payables') === 0 ? 'Payables' : 'Operating Expense'; }

  // ---- JSONP (same cross-origin trick as the water scanner) ----
  function jsonp(params){
    return new Promise(function(resolve, reject){
      var url = getUrl();
      if(!url){ reject(new Error('No Web App URL set')); return; }
      var cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*1e6);
      var s = document.createElement('script');
      var done = false;
      var timer = setTimeout(function(){ if(!done){ cleanup(); reject(new Error('Request timed out')); } }, 25000);
      function cleanup(){ done = true; clearTimeout(timer); try{ delete window[cb]; }catch(e){ window[cb]=undefined; }
        if(s && s.parentNode) s.parentNode.removeChild(s); }
      window[cb] = function(data){ cleanup(); resolve(data); };
      var q = Object.keys(params).map(function(k){
        return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]); }).join('&');
      s.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + q + '&callback=' + cb;
      s.onerror = function(){ cleanup(); reject(new Error('Network error — check the URL')); };
      document.body.appendChild(s);
    });
  }

  // ---- Toast ----
  var toastTimer;
  function toast(msg, kind){
    var t = $('toast');
    t.textContent = msg;
    t.className = 'toast show' + (kind ? ' ' + kind : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ t.className = 'toast' + (kind ? ' ' + kind : ''); }, 3200);
  }

  // ---- Categories ----
  function fillCategories(cats){
    var sel = $('category');
    sel.innerHTML = '';
    cats.forEach(function(c){
      var o = document.createElement('option');
      o.value = c; o.textContent = c; sel.appendChild(o);
    });
    updateTypeChip();
  }
  function updateTypeChip(){
    var cat = $('category').value;
    var isPay = typeOf(cat) === 'Payables';
    var chip = $('typechip');
    chip.textContent = isPay ? 'Payables (debt / loan)' : 'Operating Expense';
    chip.className = 'typechip ' + (isPay ? 't-pay' : 't-op');
  }

  // ---- Today's list ----
  function pesos(n){ return '₱' + (Number(n)||0).toLocaleString('en-PH', {minimumFractionDigits:2, maximumFractionDigits:2}); }
  function loadToday(){
    jsonp({ action:'getTodaysExpenses' }).then(function(r){
      if(!r || !r.success){ return; }
      $('todayDate').textContent = r.date ? ('For ' + r.date) : '';
      $('todayTotal').textContent = pesos(r.total);
      var list = $('list');
      if(!r.entries || r.entries.length === 0){
        list.innerHTML = '<div class="empty">No expenses logged today yet.</div>';
        return;
      }
      list.innerHTML = '';
      r.entries.forEach(function(e){
        var isPay = typeOf(e.category) === 'Payables';
        var row = document.createElement('div');
        row.className = 'exp' + (isPay ? ' pay' : '');
        row.innerHTML =
          '<div class="cat"></div>' +
          '<div class="body">' +
            '<div class="desc"></div>' +
            '<div class="meta"></div>' +
          '</div>' +
          '<div class="amt"></div>';
        row.querySelector('.desc').textContent = e.desc;
        row.querySelector('.meta').textContent = e.id + ' · ' + e.category + (e.qty > 1 ? ' · x' + e.qty : '');
        row.querySelector('.amt').textContent = pesos(e.amount);
        list.appendChild(row);
      });
    }).catch(function(){ /* leave previous list */ });
  }

  // ---- Submit ----
  function save(){
    var desc = $('desc').value.trim();
    var amount = parseFloat($('amount').value);
    if(!desc){ toast('Add a description first', 'err'); $('desc').focus(); return; }
    if(!amount || amount <= 0){ toast('Enter an amount', 'err'); $('amount').focus(); return; }

    var btn = $('save');
    var label = btn.textContent;
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span> Saving…';

    jsonp({
      action:'addExpense',
      date: $('date').value,
      description: desc,
      quantity: $('qty').value || 1,
      amount: amount,
      category: $('category').value
    }).then(function(r){
      btn.disabled = false; btn.textContent = label;
      if(r && r.success){
        toast('Saved · ' + r.id + ' · ' + r.category, 'ok');
        // reset for the next entry, keep the date
        $('desc').value = ''; $('qty').value = 1; $('amount').value = '';
        $('desc').focus();
        loadToday();
      } else {
        toast((r && r.message) ? r.message : 'Could not save', 'err');
      }
    }).catch(function(err){
      btn.disabled = false; btn.textContent = label;
      toast(err.message || 'Could not reach the sheet', 'err');
    });
  }

  // ---- Setup dialog ----
  function openSetup(){ $('urlInput').value = getUrl(); $('setup').classList.add('show'); }
  function closeSetup(){ $('setup').classList.remove('show'); }

  // ---- Init ----
  function init(){
    // default date = today (local)
    var d = new Date();
    var iso = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    $('date').value = iso;

    $('category').addEventListener('change', updateTypeChip);
    $('save').addEventListener('click', save);
    $('gear').addEventListener('click', openSetup);
    $('setupCancel').addEventListener('click', closeSetup);
    $('setupSave').addEventListener('click', function(){
      var u = $('urlInput').value.trim();
      if(!u){ toast('Paste the Web App URL', 'err'); return; }
      setUrl(u); closeSetup(); toast('Connected', 'ok');
      boot();
    });

    fillCategories(FALLBACK_CATS);

    if(!getUrl()){ openSetup(); } else { boot(); }
  }

  function boot(){
    // pull live category list (keeps the dropdown in sync with your CONFIG)
    jsonp({ action:'getExpenseConfig' }).then(function(r){
      if(r && r.success && r.categories && r.categories.length){ fillCategories(r.categories); }
    }).catch(function(){ /* keep fallback */ });
    loadToday();
  }

  init();
</script>
</body>
</html>
